name: CI

on:
  push:
    branches: ["**"]

jobs:
  formatting:
    name: Formatting (black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements/develop.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/develop.txt

      - name: Check formatting
        run: black --check .

  linting:
    name: Linting (mypy + pylint)
    runs-on: ubuntu-latest
    needs: formatting
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements/develop.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/develop.txt

      - name: Install system dependencies for Kivy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1-mesa-dev libgles2-mesa-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libmtdev-dev xvfb

      - name: mypy
        run: mypy --ignore-missing-imports --exclude venv .

      - name: pylint
        run: pylint src/ --fail-under=8.0 --output-format=colorized

  testing:
    name: Tests (pytest + coverage)
    runs-on: ubuntu-latest
    needs: formatting
    timeout-minutes: 30
    env:
      ENVIRONMENT: CI
      DISPLAY: ":99"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements/develop.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install system dependencies for Kivy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1-mesa-dev libgles2-mesa-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libmtdev-dev xvfb

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/develop.txt

      - name: Start virtual display
        run: Xvfb :99 -screen 0 1024x768x24 &

      - name: Run tests
        run: pytest

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
