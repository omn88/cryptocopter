image: python:3.12

stages:
  - formatting
  - linting
  - testing

cache:
  paths:
    - .cache/pip

before_script:
  - python -V
  - pip install --upgrade pip
  - pip install -r requirements/develop.txt

formatting:
  stage: formatting
  script:
    - pip install black==25.1.0
    - black --check .

linting:
  stage: linting
  script:
    - pip install mypy==1.15.0
    - mypy --ignore-missing-imports .

testing:
  stage: testing
  script:
    - pip install pytest
    - pytest -m "not database_integration"
