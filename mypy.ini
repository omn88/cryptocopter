[mypy]
ignore_missing_imports = True
# Meaningful strictness improvements that pass today.
# TODO: enable disallow_untyped_defs incrementally once all public functions
#       in src/ have type annotations (GUI / Kivy callbacks are the main blocker).
warn_return_any = True
warn_unused_ignores = True
strict_optional = True

[mypy-src.backtest.*,src.features.*,src.strategies.buy_dip.backtester.*]
ignore_errors = True
